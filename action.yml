name: 'game-ping.kr Deploy'
description: 'game-ping.kr에 WebGL 게임을 자동으로 업로드합니다.'
author: 'dev-yunseong'

branding:
  icon: 'upload-cloud'
  color: 'purple'

inputs:
  email:
    description: 'game-ping.kr 로그인 이메일'
    required: true
  password:
    description: 'game-ping.kr 로그인 패스워드'
    required: true
  game_slug:
    description: '업로드할 게임의 slug (예: my-awesome-game)'
    required: true
  zip_path:
    description: '업로드할 WebGL 경로 (ZIP 파일, 디렉토리, 단일 파일 모두 가능 — ZIP이 아니면 자동 압축)'
    required: false
    default: 'build.zip'
  game_title:
    description: '게임 제목 (비우면 slug → Title Case 자동 변환, 예: my-game → My Game)'
    required: false
    default: ''
  game_version:
    description: '게임 버전 (비우면 신규=0.0.1 / 기존=현재버전 patch+1 자동 결정)'
    required: false
    default: ''
  publisher:
    description: '게시자 선택: personal(개인, 기본값) 또는 team(팀)'
    required: false
    default: 'personal'
  team_name:
    description: 'publisher=team 일 때 팀 이름 (예: Team6515)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Python 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Playwright 설치
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/requirements.txt
        # Ubuntu 24.04(Noble)에서 libasound2 → libasound2t64로 패키지명 변경됨
        # playwright install-deps가 실패하므로 수동으로 의존성 설치
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libasound2t64 \
          libatk-bridge2.0-0 \
          libatk1.0-0 \
          libcairo2 \
          libcups2 \
          libdbus-1-3 \
          libdrm2 \
          libgbm1 \
          libglib2.0-0 \
          libnspr4 \
          libnss3 \
          libpango-1.0-0 \
          libx11-6 \
          libxcb1 \
          libxcomposite1 \
          libxdamage1 \
          libxext6 \
          libxfixes3 \
          libxkbcommon0 \
          libxrandr2 \
          xvfb
        playwright install chromium

    - name: WebGL 업로드 실행
      shell: bash
      env:
        GAME_PING_EMAIL: ${{ inputs.email }}
        GAME_PING_PASSWORD: ${{ inputs.password }}
        GAME_SLUG: ${{ inputs.game_slug }}
        GAME_TITLE: ${{ inputs.game_title }}
        GAME_VERSION: ${{ inputs.game_version }}
        PUBLISHER: ${{ inputs.publisher }}
        TEAM_NAME: ${{ inputs.team_name }}
        WEBGL_ZIP_PATH: ${{ inputs.zip_path }}
      run: python ${{ github.action_path }}/scripts/upload.py

    - name: 스크린샷 업로드 (디버깅용)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: game-ping-screenshots-${{ github.run_number }}
        path: screenshots/
        retention-days: 7
