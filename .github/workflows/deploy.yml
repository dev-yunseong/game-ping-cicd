name: game-ping.kr 게임 배포

on:
  push:
    branches:
      - main
    paths:
      - 'build/**'       # build 디렉토리 변경 시만 실행
      - 'build.zip'      # 또는 루트의 build.zip 변경 시
  workflow_dispatch:     # 수동 실행 허용
    inputs:
      game_slug:
        description: '배포할 게임 slug (비우면 secrets 값 사용)'
        required: false
        default: ''
      zip_path:
        description: 'WebGL ZIP 파일 경로'
        required: false
        default: 'build.zip'

jobs:
  deploy:
    name: WebGL 빌드 업로드
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # Unity Build가 별도 artifact로 올라오는 경우 다운로드
      # (Unity Cloud Build / GameCI 사용 시 주석 해제)
      # - name: 빌드 아티팩트 다운로드
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: webgl-build
      #     path: .

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: WebGL ZIP 압축 (build 디렉토리가 있을 경우)
        if: ${{ hashFiles('build/') != '' && hashFiles('build.zip') == '' }}
        run: |
          cd build
          zip -r ../build.zip .
          echo "build.zip 생성 완료: $(du -sh ../build.zip)"

      - name: 파일 확인
        run: |
          ZIP_PATH="${{ github.event.inputs.zip_path || 'build.zip' }}"
          if [ ! -f "$ZIP_PATH" ]; then
            echo "❌ ZIP 파일이 없습니다: $ZIP_PATH"
            echo "저장소에 build.zip 을 포함하거나,"
            echo "build/ 디렉토리를 포함하세요."
            exit 1
          fi
          echo "✅ 업로드 대상: $ZIP_PATH ($(du -sh $ZIP_PATH | cut -f1))"

      - name: game-ping.kr 업로드
        env:
          GAME_PING_EMAIL: ${{ secrets.GAME_PING_EMAIL }}
          GAME_PING_PASSWORD: ${{ secrets.GAME_PING_PASSWORD }}
          GAME_SLUG: ${{ github.event.inputs.game_slug || secrets.GAME_SLUG }}
          WEBGL_ZIP_PATH: ${{ github.event.inputs.zip_path || 'build.zip' }}
        run: python scripts/upload.py

      - name: 스크린샷 업로드 (디버깅용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
